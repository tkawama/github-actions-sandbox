name: Sandbox First Action

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  sandbox-job:
    runs-on: ubuntu-latest
    
    # 🌟 ここを追加！Node.js 24で動かすように指示します
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Check environment info
        run: |
          echo "実行されたブランチ: ${{ github.ref }}"
          echo "実行した人: ${{ github.actor }}"
          echo "サーバーのOS確認:"
          uname -a

      - name: Say Hello
        run: echo "github-actions-sandbox が無事に起動しました！"