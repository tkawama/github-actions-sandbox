name: Sandbox First Action

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  sandbox-job:
    runs-on: ubuntu-latest
    
    # 💡 envの2行は削除してスッキリさせます

    steps:
      # 🌟 ここを @v4 から @v5 に変更！これが最新の部品です
      - name: Checkout repository code
        uses: actions/checkout@v5

      - name: Check environment info
        run: |
          echo "実行されたブランチ: ${{ github.ref }}"
          echo "実行した人: ${{ github.actor }}"
          echo "サーバーのOS確認:"
          uname -a

      - name: Say Hello
        run: echo "github-actions-sandbox が無事に起動しました！"